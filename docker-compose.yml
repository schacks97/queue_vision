services:
  queue_vision:
    build:
      context: .
      dockerfile: dockerfile
    image: queue_vision_image
    container_name: queue_vision
    ports:
      - "8000:8000"
    gpus:
      - driver: nvidia
        count: all
        capabilities: [gpu]
    volumes:
      # Mount your local code for live reloading (optional, good for dev)
      - .:/app
      # Mount the .env.json file specifically as read-only
      - ./.env.json:/app/.env.json:ro
    # If your Django app needs to know the path to the JSON file, 
    # you can pass its internal container location as a standard env var:
    environment:
      - CONFIG_PATH=/app/.env.json
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
